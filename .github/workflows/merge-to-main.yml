name: フィーチャーブランチをmainにマージ

on:
  push:
    branches:
      - 'claude/consul-slides-app-OeyqD'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: フィーチャーブランチをmainにマージ
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git fetch origin claude/consul-slides-app-OeyqD
          git merge --no-ff origin/claude/consul-slides-app-OeyqD -m "Merge claude/consul-slides-app-OeyqD into main"
          git push origin main
