name: Consul Slides Crawl

on:
  schedule:
    # 毎週月曜 午前9時（UTC）に実行
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      reset_gist:
        description: "既存 Gist データをリセットして再クロール"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: クロール・タグ付け・Gist同期
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          RESET_GIST: ${{ github.event.inputs.reset_gist || 'false' }}
        run: |
          python3 << 'PYEOF'
          import json, sys, logging, os
          logging.basicConfig(
              level=logging.INFO,
              format="%(asctime)s [%(levelname)s] %(message)s"
          )

          reset_gist = os.environ.get("RESET_GIST", "false").lower() == "true"

          # ── Step 1: 既存URLを取得して重複排除に使用 ──
          existing_urls = set()
          if not reset_gist:
              try:
                  from scripts.gist_sync import load_existing_urls
                  existing_urls = load_existing_urls()
                  print(f"既存URL読み込み完了: {len(existing_urls)} 件", flush=True)
              except Exception as e:
                  print(f"既存URL読み込みエラー（空セットで継続）: {e}", flush=True)
          else:
              print("Gistリセットモード: 既存データを無視して全件再取得", flush=True)

          # ── Step 2: クロール ──
          entries = []
          source_counts = {"meti": 0, "mod": 0, "cao": 0}
          try:
              from scripts.crawler import crawl
              result = crawl(existing_urls)
              # crawler.py は (entries, source_counts) のタプルを返す
              entries, source_counts = result
              print(f"クロール完了: 新規 {len(entries)} 件", flush=True)
              print(f"  内訳 — meti: {source_counts.get('meti', 0)} 件"
                    f" / mod: {source_counts.get('mod', 0)} 件"
                    f" / cao: {source_counts.get('cao', 0)} 件", flush=True)
          except Exception as e:
              print(f"クロールエラー: {e}", flush=True)

          # ── Step 3: タグ付け（最大 MAX_BATCH 件を内部処理） ──
          tagged = entries
          try:
              from scripts.tagger import tag_entries
              tagged = tag_entries(entries)
              print(f"タグ付け完了: {len(tagged)} 件", flush=True)
          except Exception as e:
              print(f"タグ付けエラー（タグなしで保存）: {e}", flush=True)

          # ── Step 4: Gist同期 ──
          sync_success = False
          try:
              from scripts.gist_sync import sync, _save_gist_data, load_total_count
              if reset_gist:
                  from datetime import datetime, timezone
                  now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S")
                  data = {
                      "last_updated": now,
                      "total_count": len(tagged),
                      "slides": tagged,
                  }
                  sync_success = _save_gist_data(data)
              else:
                  sync_success = sync(tagged)
              if sync_success:
                  print("Gist同期完了", flush=True)
              else:
                  print("Gist同期に失敗しました（トークン・ID設定を確認してください）", flush=True)
          except Exception as e:
              print(f"Gist同期エラー: {e}", flush=True)

          # ── Step 5: 課題G — サイレント死検出 ──
          # 同期後に総件数が0、またはすべてのソースから0件しか取得できていない場合は
          # ワークフローを失敗させて GitHub Actions のメール通知をトリガーする
          try:
              from scripts.gist_sync import load_total_count
              total_after = load_total_count()
          except Exception as e:
              print(f"総件数取得エラー: {e}", flush=True)
              total_after = -1  # 取得失敗は異常扱いしない

          all_sources_zero = (
              source_counts.get("meti", 0) == 0
              and source_counts.get("mod", 0) == 0
              and source_counts.get("cao", 0) == 0
          )

          if total_after == 0 or all_sources_zero:
              print(
                  f"[ERROR] サイレント死を検出: total_after={total_after}, "
                  f"source_counts={source_counts}",
                  flush=True,
              )
              sys.exit(1)

          sys.exit(0)
          PYEOF
