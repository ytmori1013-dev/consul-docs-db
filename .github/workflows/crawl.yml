name: Buzz Tracker Crawl

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: はてなAPI疎通確認
        run: |
          python3 - <<'PYEOF'
          import requests, sys
          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; BuzzTracker/1.0)"}
          urls = [
              "https://b.hatena.ne.jp/hotentry/it.json",
              "https://b.hatena.ne.jp/api/ipad.hotentry.json?target=it",
              "https://b.hatena.ne.jp/hotentry/it.rss",
          ]
          for url in urls:
              try:
                  r = requests.get(url, headers=HEADERS, timeout=10)
                  print(f"[{r.status_code}] {url}")
                  print(f"  Content-Type: {r.headers.get('Content-Type','')}")
                  print(f"  Body先頭100: {r.text[:100]!r}")
              except Exception as e:
                  print(f"[ERR] {url}: {e}")
          PYEOF

      - name: クロール・フィルタ・分類・Gist同期
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, sys, logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')

          from scripts.crawler import fetch_buzz_tweets
          tweets = fetch_buzz_tweets()
          print(f'クロール完了: {len(tweets)} 件', flush=True)

          from scripts.gist_sync import load_author_history
          author_history = load_author_history()

          from scripts.filter import apply_filters
          filtered_tweets, updated_history = apply_filters(tweets, author_history)
          print(f'フィルタ完了: {len(filtered_tweets)} 件', flush=True)

          from scripts.classifier import classify_tweets_batch
          classified_tweets = classify_tweets_batch(filtered_tweets)
          print(f'分類完了: {len(classified_tweets)} 件', flush=True)

          from scripts.gist_sync import sync
          success = sync(classified_tweets, updated_history)
          if not success:
              print('Gist同期に失敗しました', flush=True)
              sys.exit(1)
          print('Gist同期完了', flush=True)
          PYEOF
