name: Consul Slides Crawl

on:
  schedule:
    # 毎週月曜 午前9時（UTC）に実行
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      reset_gist:
        description: "既存 Gist データをリセットして再クロール"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザをインストール
        run: playwright install chromium --with-deps

      - name: クロール・タグ付け・Gist同期
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          RESET_GIST: ${{ github.event.inputs.reset_gist || 'false' }}
        run: |
          python3 << 'PYEOF'
          import json, sys, logging, os
          logging.basicConfig(
              level=logging.INFO,
              format="%(asctime)s [%(levelname)s] %(message)s"
          )

          reset_gist = os.environ.get("RESET_GIST", "false").lower() == "true"

          # ── Step 1: 既存URLを取得して重複排除に使用 ──
          existing_urls = set()
          if not reset_gist:
              try:
                  from scripts.gist_sync import load_existing_urls
                  existing_urls = load_existing_urls()
                  print(f"既存URL読み込み完了: {len(existing_urls)} 件", flush=True)
              except Exception as e:
                  print(f"既存URL読み込みエラー（空セットで継続）: {e}", flush=True)
          else:
              print("Gistリセットモード: 既存データを無視して全件再取得", flush=True)

          # ── Step 2: クロール ──
          new_entries = []
          try:
              from scripts.crawler import crawl
              new_entries = crawl(existing_urls)
              print(f"クロール完了: 新規 {len(new_entries)} 件", flush=True)
          except Exception as e:
              print(f"クロールエラー: {e}", flush=True)

          if not new_entries:
              print("新規エントリーなし。処理を終了します。", flush=True)
              sys.exit(0)

          # ── Step 3: タグ付け ──
          tagged_entries = new_entries
          try:
              from scripts.tagger import tag_entries
              tagged_entries = tag_entries(new_entries)
              print(f"タグ付け完了: {len(tagged_entries)} 件", flush=True)
          except Exception as e:
              print(f"タグ付けエラー（タグなしで保存）: {e}", flush=True)

          # ── Step 4: Gist同期 ──
          try:
              from scripts.gist_sync import sync, _save_gist_data
              if reset_gist:
                  from datetime import datetime, timezone
                  now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S")
                  data = {
                      "last_updated": now,
                      "total_count": len(tagged_entries),
                      "slides": tagged_entries,
                  }
                  success = _save_gist_data(data)
              else:
                  success = sync(tagged_entries)
              if success:
                  print("Gist同期完了", flush=True)
              else:
                  print("Gist同期に失敗しました（トークン・ID設定を確認してください）", flush=True)
          except Exception as e:
              print(f"Gist同期エラー: {e}", flush=True)
          PYEOF
