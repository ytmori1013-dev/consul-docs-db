name: METI Diagnostic
on:
  workflow_dispatch:
env:
  GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
  GIST_ID: ${{ secrets.GIST_ID }}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: iframe source investigation
        run: |
          pip install requests beautifulsoup4 -q
          python3 << 'PYEOF'
          import requests, os, re
          from bs4 import BeautifulSoup
          HEADERS = {"User-Agent": "Mozilla/5.0"}
          r = requests.get("https://www.meti.go.jp/topic/data/e90622aj.html", headers=HEADERS, timeout=30)
          r.encoding = r.apparent_encoding or "utf-8"
          soup = BeautifulSoup(r.text, "html.parser")
          lines = []
          iframes = soup.find_all("iframe")
          lines.append(f"iframes: {len(iframes)}")
          for f in iframes:
              lines.append(f"  iframe src={f.get('src','')} data-src={f.get('data-src','')}")
          scripts = soup.find_all("script")
          lines.append(f"script tags: {len(scripts)}")
          for s in scripts:
              src = s.get("src", "")
              if src:
                  lines.append(f"  script src={src}")
              txt = s.string or ""
              if any(k in txt for k in ["iframe","embed","src","url","json","api"]):
                  lines.append(f"  inline script snippet: {txt[:300]}")
          all_urls = re.findall(r'https?://[^\s"\'<>]+', r.text)
          lines.append(f"http urls in html: {len(all_urls)}")
          for u in sorted(set(all_urls))[:40]:
              lines.append(f"  {u}")
          lines.append("--- html 5000 chars ---")
          lines.append(r.text[:5000])
          result = "\n".join(lines)
          print(result)
          gist_token = os.environ.get("GIST_TOKEN","")
          gist_id = os.environ.get("GIST_ID","")
          if gist_token and gist_id:
              resp = requests.patch(
                  f"https://api.github.com/gists/{gist_id}",
                  headers={"Authorization": f"token {gist_token}"},
                  json={"files": {"diag_result.txt": {"content": result}}}
              )
              print("Gist write:", resp.status_code)
          PYEOF
