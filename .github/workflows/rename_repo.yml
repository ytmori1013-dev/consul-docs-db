name: Rename Repository

on:
  workflow_dispatch:

permissions:
  administration: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Rename repo to consul-docs-db
        run: |
          response=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ytmori1013-dev/buzz_tracker \
            -d '{"name":"consul-docs-db"}')
          echo "HTTP status: $response"
          cat /tmp/resp.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('New name:', d.get('name','ERROR')); print('New URL:', d.get('html_url','N/A'))"
